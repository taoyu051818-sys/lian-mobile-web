name: Frontend Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend:
    name: Build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Vue entry
        run: npm run build

      - name: Run project checks
        run: npm run check

      - name: Start legacy static rehearsal server
        run: |
          npm run start:frontend-static > /tmp/lian-frontend.log 2>&1 &
          echo $! > /tmp/lian-frontend.pid
          sleep 2

      - name: Run legacy static smoke test
        run: npm test

      - name: Print static server log on failure
        if: failure()
        run: |
          if [ -f /tmp/lian-frontend.log ]; then
            cat /tmp/lian-frontend.log
          fi

      - name: Stop legacy static rehearsal server
        if: always()
        run: |
          if [ -f /tmp/lian-frontend.pid ]; then
            kill "$(cat /tmp/lian-frontend.pid)" || true
          fi
