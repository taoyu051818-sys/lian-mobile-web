<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LIAN Coastline Alignment</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
      :root { --ink: #0f1a14; --line: #e2e8e5; --accent: #2563eb; --red: #dc2626; }
      * { box-sizing: border-box; margin: 0; }
      body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f5; color: var(--ink); }
      .shell { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
      .pane { position: relative; overflow: hidden; }
      .pane-title { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 500;
        padding: 4px 14px; border-radius: 6px; background: rgba(255,255,255,0.95);
        box-shadow: 0 2px 8px rgba(0,0,0,0.12); font-size: 13px; font-weight: 700; pointer-events: none; }
      #imageCanvas { display: block; cursor: crosshair; }
      #gaodeMap { width: 100%; height: 100%; }
      .sidebar { position: fixed; right: 0; top: 0; width: 320px; height: 100vh; overflow-y: auto;
        background: #fff; border-left: 1px solid var(--line); padding: 14px; z-index: 600; }
      .sidebar h2 { font-size: 15px; margin-bottom: 8px; }
      .sidebar p { font-size: 11px; color: #6b746f; margin-bottom: 6px; line-height: 1.5; }
      .section { padding: 10px; margin-bottom: 8px; border: 1px solid var(--line); border-radius: 8px; }
      .section strong { font-size: 11px; color: #6b746f; text-transform: uppercase; letter-spacing: 0.05em; }
      .status { padding: 4px 0; font-size: 12px; font-weight: 600; }
      button { width: 100%; padding: 9px; border: 0; border-radius: 8px; background: var(--ink);
        color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 4px; }
      button:hover { background: #1a2e24; }
      button.secondary { background: var(--line); color: var(--ink); }
      .result { margin-top: 8px; padding: 10px; border-radius: 8px; background: #f0fdf4; border: 1px solid #bbf7d0; }
      .result pre { font-size: 11px; white-space: pre-wrap; word-break: break-all; }
      .hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); z-index: 500;
        padding: 3px 10px; border-radius: 5px; background: rgba(0,0,0,0.6); color: #fff;
        font-size: 11px; pointer-events: none; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="pane">
        <div class="pane-title">底图 — 画海岸线（左键画点，右键完成）</div>
        <canvas id="imageCanvas"></canvas>
        <div class="hint">左键画点 · 右键完成 · 滚轮缩放</div>
      </div>
      <div class="pane">
        <div class="pane-title">高德地图 — 画海岸线（左键画点，右键完成）</div>
        <div id="gaodeMap"></div>
      </div>
    </div>
    <aside class="sidebar">
      <h2>海岸线对齐</h2>
      <p>1. 在左边底图上沿画海岸线，右键完成<br>2. 在右边高德地图上沿同一段海岸线画，右键完成<br>3. 点"计算变换"</p>

      <div class="section">
        <strong>底图海岸线</strong>
        <div id="imgStatus" class="status">未绘制</div>
        <button class="secondary" id="clearImg">清除</button>
      </div>

      <div class="section">
        <strong>高德海岸线</strong>
        <div id="geoStatus" class="status">未绘制</div>
        <button class="secondary" id="clearGeo">清除</button>
      </div>

      <button id="calcBtn">计算变换 & 边界</button>
      <button class="secondary" id="copyBtn">复制边界</button>

      <div id="result" class="result" style="display:none"></div>
    </aside>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function () {
      const GAODE = "https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}";
      const IMG_URL = "/assets/campus-base-map.png";

      // --- Image canvas ---
      const canvas = document.getElementById("imageCanvas");
      const ctx = canvas.getContext("2d");
      let imgW = 0, imgH = 0;
      let viewScale = 1, viewOffX = 0, viewOffY = 0;
      let isDragging = false, dragSX, dragSY, dragOX, dragOY;

      let imgPoints = []; // {x, y} in image pixel coords
      let geoPoints = []; // {lat, lng}
      let imgDone = false, geoDone = false;

      const imageObj = new Image();
      imageObj.onload = () => { imgW = imageObj.width; imgH = imageObj.height; fitImage(); draw(); };
      imageObj.src = IMG_URL;

      function fitImage() {
        const r = canvas.parentElement.getBoundingClientRect();
        canvas.width = r.width; canvas.height = r.height;
        viewScale = Math.min(canvas.width / imgW, canvas.height / imgH) * 0.9;
        viewOffX = (canvas.width - imgW * viewScale) / 2;
        viewOffY = (canvas.height - imgH * viewScale) / 2;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!imgW) return;
        ctx.save(); ctx.translate(viewOffX, viewOffY); ctx.scale(viewScale, viewScale);
        ctx.drawImage(imageObj, 0, 0); ctx.restore();

        if (imgPoints.length > 0) {
          ctx.beginPath();
          for (let i = 0; i < imgPoints.length; i++) {
            const sx = imgPoints[i].x * viewScale + viewOffX;
            const sy = imgPoints[i].y * viewScale + viewOffY;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
          }
          ctx.strokeStyle = imgDone ? "#16a34a" : "#dc2626"; ctx.lineWidth = 2; ctx.stroke();
          for (const p of imgPoints) {
            const sx = p.x * viewScale + viewOffX, sy = p.y * viewScale + viewOffY;
            ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2);
            ctx.fillStyle = imgDone ? "#16a34a" : "#dc2626"; ctx.fill();
          }
        }
      }

      function screenToImg(e) {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left - viewOffX) / viewScale, y: (e.clientY - r.top - viewOffY) / viewScale };
      }

      canvas.addEventListener("mousedown", e => {
        if (e.button === 2) return;
        if (!imgDone) {
          const p = screenToImg(e);
          imgPoints.push(p);
          document.getElementById("imgStatus").textContent = imgPoints.length + " 个点（右键完成）";
          draw();
        } else {
          isDragging = true; dragSX = e.clientX; dragSY = e.clientY;
          dragOX = viewOffX; dragOY = viewOffY;
        }
      });
      canvas.addEventListener("contextmenu", e => {
        e.preventDefault();
        if (imgPoints.length >= 2 && !imgDone) {
          imgDone = true;
          document.getElementById("imgStatus").textContent = imgPoints.length + " 个点 ✓";
        }
      });
      canvas.addEventListener("wheel", e => {
        e.preventDefault();
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        const f = e.deltaY < 0 ? 1.15 : 1 / 1.15;
        const ns = Math.max(0.15, Math.min(30, viewScale * f));
        viewOffX = mx - (mx - viewOffX) * (ns / viewScale);
        viewOffY = my - (my - viewOffY) * (ns / viewScale);
        viewScale = ns; draw();
      }, { passive: false });
      window.addEventListener("mousemove", e => {
        if (!isDragging) return;
        viewOffX = dragOX + (e.clientX - dragSX);
        viewOffY = dragOY + (e.clientY - dragSY); draw();
      });
      window.addEventListener("mouseup", () => isDragging = false);

      // --- Gaode map ---
      const map = L.map("gaodeMap", { center: [18.3935, 110.0159], zoom: 14, minZoom: 12, maxZoom: 19, attributionControl: false });
      L.tileLayer(GAODE, { subdomains: ["1","2","3","4"], maxZoom: 19, minZoom: 3 }).addTo(map);

      let geoLine = null;
      map.on("click", e => {
        if (geoDone) return;
        geoPoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
        if (geoLine) geoLine.remove();
        geoLine = L.polyline(geoPoints.map(p => [p.lat, p.lng]), { color: "#dc2626", weight: 2 }).addTo(map);
        document.getElementById("geoStatus").textContent = geoPoints.length + " 个点（右键完成）";
      });
      map.on("contextmenu", e => {
        if (geoPoints.length >= 2 && !geoDone) {
          geoDone = true;
          if (geoLine) geoLine.remove();
          geoLine = L.polyline(geoPoints.map(p => [p.lat, p.lng]), { color: "#16a34a", weight: 3 }).addTo(map);
          document.getElementById("geoStatus").textContent = geoPoints.length + " 个点 ✓";
        }
      });

      // --- Compute transform ---
      document.getElementById("calcBtn").addEventListener("click", () => {
        if (!imgDone || !geoDone) { alert("请先在两边都画完海岸线！"); return; }
        const n = Math.min(imgPoints.length, geoPoints.length);
        if (n < 2) { alert("至少需要 2 对点！"); return; }

        // Sample n evenly-spaced points from both curves
        const imgSampled = sampleCurve(imgPoints, n);
        const geoSampled = sampleCurve(geoPoints, n);

        // Solve affine: imgX = a*lng + b*lat + c, imgY = d*lng + e*lat + f
        // (we map geo -> image pixel)
        const A = [], bx = [], by = [];
        for (let i = 0; i < n; i++) {
          A.push([geoSampled[i].lng, geoSampled[i].lat, 1]);
          bx.push(imgSampled[i].x);
          by.push(imgSampled[i].y);
        }
        const cx = leastSquares(A, bx);
        const cy = leastSquares(A, by);

        // Image corners -> geo
        function imgToGeo(px, py) {
          // Solve: px = cx[0]*lng + cx[1]*lat + cx[2]
          //        py = cy[0]*lng + cy[1]*lat + cy[2]
          const det = cx[0]*cy[1] - cx[1]*cy[0];
          if (Math.abs(det) < 1e-12) return null;
          const lng = (cy[1]*(px - cx[2]) - cx[1]*(py - cy[2])) / det;
          const lat = (cx[0]*(py - cy[2]) - cy[0]*(px - cx[2])) / det;
          return { lat, lng };
        }

        const c00 = imgToGeo(0, 0);
        const c10 = imgToGeo(imgW, 0);
        const c11 = imgToGeo(imgW, imgH);
        const c01 = imgToGeo(0, imgH);
        if (!c00 || !c10 || !c11 || !c01) { alert("变换退化，无法计算。"); return; }

        const corners = [c00, c10, c11, c01];
        const south = Math.min(...corners.map(c => c.lat));
        const north = Math.max(...corners.map(c => c.lat));
        const west = Math.min(...corners.map(c => c.lng));
        const east = Math.max(...corners.map(c => c.lng));

        // Residual
        let maxErr = 0;
        for (let i = 0; i < n; i++) {
          const g = imgToGeo(imgSampled[i].x, imgSampled[i].y);
          const err = Math.sqrt((g.lat - geoSampled[i].lat)**2 + (g.lng - geoSampled[i].lng)**2);
          if (err > maxErr) maxErr = err;
        }

        const result = document.getElementById("result");
        result.style.display = "block";
        result.innerHTML = `<pre>边界:
  south: ${south.toFixed(7)}
  north: ${north.toFixed(7)}
  west: ${west.toFixed(7)}
  east: ${east.toFixed(7)}

四角:
  左上: ${c00.lat.toFixed(7)}, ${c00.lng.toFixed(7)}
  右上: ${c10.lat.toFixed(7)}, ${c10.lng.toFixed(7)}
  右下: ${c11.lat.toFixed(7)}, ${c11.lng.toFixed(7)}
  左下: ${c01.lat.toFixed(7)}, ${c01.lng.toFixed(7)}

最大残差: ${(maxErr*111000).toFixed(1)} 米 | 匹配点: ${n}</pre>`;

        L.rectangle([[south, west], [north, east]], { color: "#2563eb", weight: 2, fill: false, dashArray: "8 4" }).addTo(map);
      });

      function sampleCurve(pts, n) {
        if (pts.length === n) return pts;
        const result = [];
        for (let i = 0; i < n; i++) {
          const t = i / (n - 1) * (pts.length - 1);
          const idx = Math.min(Math.floor(t), pts.length - 2);
          const frac = t - idx;
          result.push({
            x: pts[idx].x * (1 - frac) + (pts[idx + 1]?.x || pts[idx].x) * frac,
            y: pts[idx].y * (1 - frac) + (pts[idx + 1]?.y || pts[idx].y) * frac,
            lat: (pts[idx].lat || 0) * (1 - frac) + ((pts[idx + 1]?.lat || pts[idx].lat) || 0) * frac,
            lng: (pts[idx].lng || 0) * (1 - frac) + ((pts[idx + 1]?.lng || pts[idx].lng) || 0) * frac
          });
        }
        return result;
      }

      function leastSquares(A, b) {
        const m = A.length, n = A[0].length;
        const AtA = Array.from({length:n}, () => Array(n).fill(0)), Atb = Array(n).fill(0);
        for (let i = 0; i < m; i++) for (let j = 0; j < n; j++) {
          Atb[j] += A[i][j] * b[i];
          for (let k = 0; k < n; k++) AtA[j][k] += A[i][j] * A[i][k];
        }
        return gauss(AtA, Atb);
      }
      function gauss(A, b) {
        const n = A.length, M = A.map((r, i) => [...r, b[i]]);
        for (let c = 0; c < n; c++) {
          let mr = c; for (let r = c + 1; r < n; r++) if (Math.abs(M[r][c]) > Math.abs(M[mr][c])) mr = r;
          [M[c], M[mr]] = [M[mr], M[c]];
          for (let r = c + 1; r < n; r++) { const f = M[r][c] / M[c][c]; for (let j = c; j <= n; j++) M[r][j] -= f * M[c][j]; }
        }
        const x = Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) { x[i] = M[i][n]; for (let j = i + 1; j < n; j++) x[i] -= M[i][j] * x[j]; x[i] /= M[i][i]; }
        return x;
      }

      // Clear buttons
      document.getElementById("clearImg").addEventListener("click", () => {
        imgPoints = []; imgDone = false;
        document.getElementById("imgStatus").textContent = "未绘制"; draw();
      });
      document.getElementById("clearGeo").addEventListener("click", () => {
        geoPoints = []; geoDone = false;
        if (geoLine) geoLine.remove(); geoLine = null;
        document.getElementById("geoStatus").textContent = "未绘制";
      });
      document.getElementById("copyBtn").addEventListener("click", () => {
        const pre = document.querySelector(".result pre");
        if (!pre) { alert("先计算！"); return; }
        navigator.clipboard.writeText(pre.textContent).then(() => alert("已复制"));
      });

      window.addEventListener("resize", () => { fitImage(); draw(); });
    })();
    </script>
  </body>
</html>
