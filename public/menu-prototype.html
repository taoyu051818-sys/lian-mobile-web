<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>菜单原型</title>
    <link rel="stylesheet" href="/menu-prototype.css">
  </head>
  <body>
    <main class="menu-app">
      <header class="shop-head">
        <div>
          <p class="eyebrow">店铺菜单</p>
          <h1>今天吃什么</h1>
          <p class="subline" id="menuSummary">正在整理菜单</p>
        </div>
        <button class="ghost-button" id="compactToggle" type="button">精简</button>
      </header>

      <section class="quick-scenes" aria-label="场景推荐">
        <button class="scene is-active" type="button" data-scene="all">全部</button>
        <button class="scene" type="button" data-scene="solo">一人吃</button>
        <button class="scene" type="button" data-scene="share">两人拼</button>
        <button class="scene" type="button" data-scene="tea">下午茶</button>
        <button class="scene" type="button" data-scene="light">轻食</button>
        <button class="scene" type="button" data-scene="budget">便宜点</button>
      </section>

      <section class="recommend-panel" id="recommendPanel"></section>

      <nav class="category-rail" id="categoryRail" aria-label="菜单分类"></nav>

      <section class="category-list" id="categoryList" aria-live="polite"></section>
    </main>

    <script src="/menu-prototype.js"></script>
  </body>
</html>
