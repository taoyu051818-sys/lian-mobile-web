<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIAN Ops</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { max-width: 1040px; margin: 0 auto; padding: 24px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f7f4; color: #1f2823; }
    .ops-card { background: #fff; border: 1px solid #dde3dc; border-radius: 18px; padding: 20px; box-shadow: 0 10px 30px rgba(20, 32, 25, .08); margin-bottom: 16px; }
    .ops-row { display: grid; gap: 10px; margin: 14px 0; }
    .ops-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    label { font-weight: 700; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #cdd7cf; border-radius: 12px; padding: 12px; font-size: 15px; }
    button { border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 800; background: #234936; color: #fff; cursor: pointer; }
    button.secondary { background: #e7eee8; color: #234936; }
    button.danger { background: #8f2f2f; }
    button:disabled { opacity: .55; cursor: wait; }
    .status { font-weight: 800; }
    .ok { color: #197446; }
    .bad { color: #b42b2b; }
    .muted { color: #6b746d; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #101914; color: #e8f2ea; padding: 16px; border-radius: 14px; }
    .checks, .observability { display: grid; gap: 10px; }
    .check, .obs-card { border: 1px solid #dde3dc; border-radius: 14px; padding: 12px; background: #fbfcfa; }
    .obs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
    .obs-card h3 { margin: 0 0 8px; }
    .obs-kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 10px; font-size: 14px; }
    .obs-kv strong { color: #48534b; }
    .badge { display: inline-block; border-radius: 999px; padding: 3px 9px; font-size: 12px; font-weight: 800; background: #edf4ef; color: #197446; }
    .badge.bad { background: #f8e8e8; color: #b42b2b; }
    .badge.muted { background: #eef0ed; color: #6b746d; }
    ul.compact { margin: 8px 0 0; padding-left: 18px; }
  </style>
</head>
<body>
  <main>
    <section class="ops-card">
      <h1>LIAN Ops</h1>
      <p class="muted">受 ADMIN_TOKEN 保护的运维台。操作按钮只触发固定白名单动作，不支持输入任意命令。</p>
      <div class="ops-row">
        <label for="adminToken">ADMIN_TOKEN</label>
        <input id="adminToken" type="password" autocomplete="current-password" placeholder="输入后仅保存在当前浏览器会话">
      </div>
      <div class="ops-row">
        <label for="publicBase">公网入口</label>
        <input id="publicBase" type="url" placeholder="默认使用当前页面域名">
      </div>
      <div class="ops-actions">
        <button id="runHealth">运行健康检查</button>
      </div>
      <p id="summary" class="status muted">未运行</p>
    </section>

    <section class="ops-card">
      <h2>运行时状态</h2>
      <p class="muted">自动从后端观测接口读取仓库 commit、工作区 dirty 状态、PM2 / systemd 服务状态。</p>
      <div id="observability" class="observability"><p class="muted">未运行</p></div>
    </section>

    <section class="ops-card">
      <h2>更新 / 重启</h2>
      <p class="muted">更新会执行固定的 git pull --ff-only，然后重启对应服务。动作会异步执行，完成后再点一次健康检查。</p>
      <div class="ops-actions">
        <button class="secondary" data-action="restart-frontend">重启前端</button>
        <button class="secondary" data-action="restart-backend">重启后端</button>
        <button class="secondary" data-action="restart-all">重启全部</button>
        <button data-action="update-frontend">更新并重启前端</button>
        <button data-action="update-backend">更新并重启后端</button>
        <button class="danger" data-action="update-all">更新并重启全部</button>
        <button class="secondary" data-action="set-security-development">切换开发模式</button>
        <button class="danger" data-action="set-security-production">切换生产模式</button>
      </div>
      <p id="actionStatus" class="status muted">未触发动作</p>
    </section>

    <section class="ops-card">
      <h2>检查项</h2>
      <div id="checks" class="checks"></div>
    </section>

    <section class="ops-card">
      <h2>原始响应</h2>
      <pre id="raw">{}</pre>
    </section>
  </main>
  <script src="/ops.js"></script>
  <script src="/ops-observability.js"></script>
</body>
</html>
